# Uncomment the following lines to enable the RGB Underglow
# CONFIG_ZMK_RGB_UNDERGLOW=y
# CONFIG_WS2812_STRIP=y

# Uncomment the following line to enable the OLED Display
# CONFIG_ZMK_DISPLAY=y

CONFIG_ZMK_SLEEP=n
# CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=7200000

CONFIG_ZMK_BATTERY_REPORTING=y
# Disable battery level fetching from peripheral — stale GATT handles on
# disconnect may corrupt BLE state and cause freeze (see docs/freeze-investigation.md)
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=n
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=n

CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_BT_CTLR_PHY_2M=n

CONFIG_BT_MAX_CONN=4
CONFIG_BT_MAX_PAIRED=4

# Crash diagnosis - detect stack overflows and dump fault info over USB log
CONFIG_HW_STACK_PROTECTION=y
CONFIG_EXCEPTION_STACK_TRACE=y
# Round 2: enable assertions to catch combo re-entrancy (see docs/freeze-investigation.md)
CONFIG_ASSERT=y
CONFIG_ASSERT_LEVEL=2

# Increase thread stack sizes — stack overflow ruled out as cause but keep
# generous sizes to avoid masking issues during assert/fault handling
# Defaults: BLE=768, split central=512, system workqueue=2048, logging=768
CONFIG_ZMK_BLE_THREAD_STACK_SIZE=1536
CONFIG_ZMK_SPLIT_BLE_CENTRAL_SPLIT_RUN_STACK_SIZE=1024
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_LOG_PROCESS_THREAD_STACK_SIZE=1536

# Runtime stack usage analysis - prints per-thread stack high watermarks
CONFIG_THREAD_ANALYZER=y
CONFIG_THREAD_ANALYZER_AUTO=y
CONFIG_THREAD_ANALYZER_AUTO_INTERVAL=30
CONFIG_THREAD_NAME=y

# Debug logging (output only visible with zmk-usb-logging snippet)
CONFIG_ZMK_LOG_LEVEL_DBG=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_POSITION_QUEUE_SIZE=10
