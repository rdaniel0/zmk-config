# Uncomment the following lines to enable the RGB Underglow
# CONFIG_ZMK_RGB_UNDERGLOW=y
# CONFIG_WS2812_STRIP=y

# Uncomment the following line to enable the OLED Display
# CONFIG_ZMK_DISPLAY=y

CONFIG_ZMK_SLEEP=n
# CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=7200000

CONFIG_ZMK_BATTERY_REPORTING=y
# Disable battery level fetching from peripheral — stale GATT handles on
# disconnect may corrupt BLE state and cause freeze (see docs/freeze-investigation.md)
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=n

CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_BT_CTLR_PHY_2M=n

CONFIG_BT_MAX_CONN=4
CONFIG_BT_MAX_PAIRED=4

# Increase BLE TX buffers — bt_gatt_notify_cb blocks with K_FOREVER on
# non-system-workqueue threads (like hog_work_q) when TX buffers are exhausted.
# Default is 3, which can be exhausted during rapid typing. Increase to reduce
# the chance of hog_work_q blocking permanently.
CONFIG_BT_BUF_ACL_TX_COUNT=12
CONFIG_BT_L2CAP_TX_BUF_COUNT=14
CONFIG_BT_CONN_TX_MAX=12

# Crash diagnosis - detect stack overflows
CONFIG_HW_STACK_PROTECTION=y

# Hardware watchdog — auto-recovers keyboard on freeze instead of requiring
# manual power cycle. The system workqueue feeds the watchdog; if it stalls,
# the watchdog resets the MCU after the timeout.
CONFIG_WATCHDOG=y
CONFIG_TASK_WDT=y
CONFIG_TASK_WDT_HW_FALLBACK=y

# Increased stack sizes — doesn't eliminate freeze but reduces frequency
# Defaults: BLE=768, split central=512, system workqueue=2048, logging=768
CONFIG_ZMK_BLE_THREAD_STACK_SIZE=1536
CONFIG_ZMK_SPLIT_BLE_CENTRAL_SPLIT_RUN_STACK_SIZE=1024
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_LOG_PROCESS_THREAD_STACK_SIZE=1536

# Debug logging (output only visible with zmk-usb-logging snippet)
CONFIG_ZMK_LOG_LEVEL_DBG=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_POSITION_QUEUE_SIZE=10

# Prevent logging from blocking threads when buffers are full
# The log truncation mid-write in BLE RX thread suggests the logging backend
# stalls, blocking the caller. These settings ensure log messages are dropped
# rather than causing a deadlock.
CONFIG_LOG_MODE_OVERFLOW=y
CONFIG_USB_CDC_ACM_RINGBUF_SIZE=4096
