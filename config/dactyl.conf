# Uncomment the following lines to enable the RGB Underglow
# CONFIG_ZMK_RGB_UNDERGLOW=y
# CONFIG_WS2812_STRIP=y

# Uncomment the following line to enable the OLED Display
# CONFIG_ZMK_DISPLAY=y

CONFIG_ZMK_SLEEP=n
# CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=7200000

CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y

CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_BT_CTLR_PHY_2M=n

CONFIG_BT_MAX_CONN=4
CONFIG_BT_MAX_PAIRED=4

# ==========================================
# Watchdog - auto-reset on freeze (15 second timeout)
# ==========================================
CONFIG_WDT=y
CONFIG_ZMK_WATCHDOG=y

# ==========================================
# Enhanced logging for debugging freezes
# ==========================================
# Uncomment these when using the _logging build variants
# CONFIG_ZMK_LOG_LEVEL_DBG=y
# CONFIG_ZMK_USB_LOGGING=y

# BLE/Split debugging (enable with logging builds)
# CONFIG_BT_DEBUG_LOG=y
# CONFIG_ZMK_SPLIT_BLE_CENTRAL_POSITION_QUEUE_SIZE=10
# CONFIG_ZMK_BLE_THREAD_STACK_SIZE=1024
