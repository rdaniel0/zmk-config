# Logging-specific configuration overlay
# Applied only to the dactyl_right_logging build variant
#
# IMPORTANT: After flashing, select BLE output with the &out OUT_BLE key
# (OS_FnNumbers layer) so keyboard data flows over BT while logs stream
# over USB. This preference persists across reboots.

# Debug-level ZMK logging
CONFIG_ZMK_LOG_LEVEL_DBG=y

# BLE/Split debugging - critical for diagnosing BT disconnections
CONFIG_BT_DEBUG_LOG=y

# Larger position queue to avoid dropped events during heavy logging
CONFIG_ZMK_SPLIT_BLE_CENTRAL_POSITION_QUEUE_SIZE=10
